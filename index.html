<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Amsterdam">
<title>Amsterdam 🌷</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,wght@0,300;0,400;0,500;0,600;1,300&family=DM+Serif+Display:ital@0;1&display=swap" rel="stylesheet">
<style>
:root {
  --navy: #1A3A5C;
  --red: #E8355A;
  --green: #4A7C59;
  --gold: #C8860A;
  --gold-light: #FFFBF0;
  --gold-border: #F5C842;
  --bg: #F7F4EF;
  --card: #FFFFFF;
  --text: #1C1C1C;
  --muted: #6B6B6B;
  --border: rgba(0,0,0,0.1);
  --radius: 14px;
  --radius-sm: 8px;
  --safe-top: env(safe-area-inset-top, 0px);
  --safe-bottom: env(safe-area-inset-bottom, 0px);
}
* { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
html, body { height: 100%; background: var(--bg); font-family: 'DM Sans', sans-serif; color: var(--text); overflow-x: hidden; }

/* APP SHELL */
.app-shell { display: flex; flex-direction: column; height: 100dvh; max-width: 480px; margin: 0 auto; }

/* HEADER */
.app-header {
  background: var(--navy);
  padding: calc(var(--safe-top) + 14px) 20px 14px;
  flex-shrink: 0;
}
.header-top { display: flex; align-items: flex-start; justify-content: space-between; }
.header-title { font-family: 'DM Serif Display', serif; font-size: 28px; color: #fff; letter-spacing: 0.5px; line-height: 1; }
.header-sub { font-size: 12px; color: rgba(255,255,255,0.6); margin-top: 3px; letter-spacing: 0.3px; }
.reset-btn { background: rgba(255,255,255,0.15); border: none; color: #fff; font-size: 11px; padding: 5px 10px; border-radius: 20px; cursor: pointer; font-family: inherit; }

/* DAY TABS */
.day-tabs { display: flex; gap: 8px; padding: 12px 16px; background: var(--navy); flex-shrink: 0; }
.day-tab {
  flex: 1; padding: 8px 4px; border-radius: var(--radius-sm); border: none;
  background: rgba(255,255,255,0.12); color: rgba(255,255,255,0.6);
  font-family: inherit; font-size: 11px; font-weight: 500; cursor: pointer;
  transition: all .2s; line-height: 1.4; text-align: center;
}
.day-tab.active { background: #fff; color: var(--navy); }
.day-tab span { display: block; font-size: 13px; font-weight: 600; }

/* PROGRESS */
.progress-wrap { padding: 10px 16px 0; background: var(--navy); flex-shrink: 0; }
.progress-info { display: flex; justify-content: space-between; font-size: 11px; color: rgba(255,255,255,0.55); margin-bottom: 5px; }
.progress-track { height: 3px; background: rgba(255,255,255,0.15); border-radius: 2px; overflow: hidden; margin-bottom: 12px; }
.progress-fill { height: 100%; border-radius: 2px; background: #fff; transition: width .4s ease; }

/* FILTER */
.filter-bar { display: flex; gap: 8px; padding: 10px 16px; flex-shrink: 0; align-items: center; border-bottom: 1px solid var(--border); }
.filter-chip { padding: 5px 13px; border-radius: 20px; border: 1px solid var(--border); background: var(--card); font-size: 12px; font-family: inherit; cursor: pointer; color: var(--muted); font-weight: 500; transition: all .15s; }
.filter-chip.active { background: var(--gold); color: #fff; border-color: var(--gold); }

/* SCROLL AREA */
.scroll-area { flex: 1; overflow-y: auto; -webkit-overflow-scrolling: touch; padding: 12px 16px calc(var(--safe-bottom) + 16px); }

/* INTRO BOX */
.intro-box { background: var(--card); border-radius: var(--radius); border: 1px solid var(--border); padding: 12px 14px; margin-bottom: 12px; }
.intro-row { display: flex; gap: 10px; padding: 4px 0; font-size: 12.5px; align-items: baseline; }
.intro-icon { width: 18px; text-align: center; flex-shrink: 0; font-size: 14px; }
.intro-time { font-weight: 600; min-width: 72px; flex-shrink: 0; font-size: 12px; color: var(--muted); }
.intro-desc { color: var(--text); flex: 1; }

/* SECTION LABEL */
.section-lbl { font-size: 10px; font-weight: 600; letter-spacing: 1px; text-transform: uppercase; color: var(--muted); margin: 14px 0 8px; }

/* ADD STOP BTN */
.add-stop-btn { width: 100%; padding: 10px; border: 1.5px dashed var(--border); border-radius: var(--radius-sm); background: transparent; font-family: inherit; font-size: 13px; color: var(--muted); cursor: pointer; margin-bottom: 10px; transition: all .15s; }
.add-stop-btn:active { background: var(--bg); }

/* STOP CARD */
.stop-card {
  background: var(--card); border-radius: var(--radius-sm); border: 1px solid var(--border);
  padding: 10px 12px; margin-bottom: 8px; position: relative; transition: opacity .2s;
}
.stop-card.done { opacity: 0.45; }
.stop-card.done .stop-name { text-decoration: line-through; }
.stop-top { display: flex; align-items: flex-start; gap: 10px; }
.stop-check { width: 22px; height: 22px; border-radius: 50%; border: 2px solid var(--border); background: transparent; flex-shrink: 0; cursor: pointer; display: flex; align-items: center; justify-content: center; margin-top: 1px; transition: all .15s; }
.stop-check.checked { border-color: transparent; }
.stop-check.checked::after { content: '✓'; font-size: 12px; font-weight: 600; color: #fff; }
.stop-body { flex: 1; min-width: 0; }
.stop-time-badge { font-size: 10px; font-weight: 600; padding: 2px 7px; border-radius: 10px; display: inline-block; color: #fff; margin-bottom: 3px; }
.stop-name { font-size: 14px; font-weight: 500; line-height: 1.3; }
.stop-note { font-size: 12px; color: var(--muted); margin-top: 2px; line-height: 1.4; }
.gf-badge { display: inline-block; font-size: 10px; padding: 2px 7px; border-radius: 10px; margin-top: 4px; font-weight: 500; }
.gf-yes { background: #E8F5EC; color: #2A5C38; }
.gf-no  { background: #FEE; color: #8B1A1A; }
.stop-actions { display: flex; gap: 6px; margin-top: 8px; }
.stop-btn { font-size: 11px; padding: 4px 10px; border-radius: 20px; border: 1px solid var(--border); background: var(--bg); cursor: pointer; font-family: inherit; color: var(--muted); }
.stop-btn.danger { color: #c0392b; border-color: #fcc; background: #fff5f5; }

/* NOTES AREA */
.notes-box { background: var(--card); border-radius: var(--radius); border: 1px solid var(--border); padding: 12px 14px; margin-top: 4px; }
.notes-label { font-size: 11px; font-weight: 600; letter-spacing: .5px; color: var(--muted); margin-bottom: 6px; }
.notes-textarea { width: 100%; border: none; background: transparent; font-family: inherit; font-size: 13.5px; color: var(--text); resize: none; line-height: 1.6; outline: none; min-height: 80px; }
.notes-textarea::placeholder { color: #bbb; }

/* GF BOX */
.gf-box { background: var(--gold-light); border: 1px solid var(--gold-border); border-radius: var(--radius); padding: 12px 14px; margin-top: 12px; }
.gf-box-title { font-size: 12px; font-weight: 600; color: var(--gold); margin-bottom: 8px; }
.gf-item { display: flex; gap: 8px; font-size: 12.5px; color: #5A3A00; margin-bottom: 5px; align-items: flex-start; line-height: 1.4; }
.gf-dot { width: 5px; height: 5px; border-radius: 50%; background: var(--gold); flex-shrink: 0; margin-top: 6px; }

/* MAP SECTION */
.map-box { background: var(--card); border-radius: var(--radius); border: 1px solid var(--border); overflow: hidden; margin-top: 12px; }
.map-head { display: flex; justify-content: space-between; align-items: center; padding: 10px 14px; border-bottom: 1px solid var(--border); }
.map-head span { font-size: 13px; font-weight: 500; }
.map-link { font-size: 11px; color: var(--navy); border: 1px solid var(--navy); border-radius: 20px; padding: 4px 10px; text-decoration: none; font-weight: 500; }
.map-pin { display: flex; gap: 10px; padding: 9px 14px; border-bottom: 1px solid var(--border); align-items: flex-start; }
.map-pin:last-child { border-bottom: none; }
.pin-num { width: 22px; height: 22px; border-radius: 50%; color: #fff; font-size: 10px; font-weight: 600; display: flex; align-items: center; justify-content: center; flex-shrink: 0; margin-top: 1px; }
.pin-name { font-size: 13px; font-weight: 500; }
.pin-addr { font-size: 11px; color: var(--muted); }

/* MODAL */
.modal-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.5); display: flex; align-items: flex-end; z-index: 100; }
.modal-overlay.hidden { display: none; }
.modal { background: var(--card); border-radius: var(--radius) var(--radius) 0 0; width: 100%; padding: 20px 20px calc(var(--safe-bottom) + 20px); max-height: 80dvh; overflow-y: auto; }
.modal h2 { font-size: 17px; font-weight: 600; margin-bottom: 16px; }
.modal label { font-size: 12px; font-weight: 600; color: var(--muted); display: block; margin-bottom: 4px; margin-top: 12px; }
.modal input, .modal textarea {
  width: 100%; border: 1px solid var(--border); border-radius: var(--radius-sm);
  padding: 10px 12px; font-family: inherit; font-size: 14px; background: var(--bg);
  color: var(--text); outline: none; -webkit-appearance: none;
}
.modal textarea { resize: none; min-height: 60px; line-height: 1.5; }
.modal-btns { display: flex; gap: 10px; margin-top: 18px; }
.modal-btns button { flex: 1; padding: 12px; border-radius: var(--radius-sm); font-family: inherit; font-size: 14px; font-weight: 500; cursor: pointer; border: none; }
.btn-save { color: #fff; }
.btn-cancel { background: var(--bg); color: var(--muted); }
.btn-delete { background: #ffeaea; color: #c0392b; }

/* TOAST */
.toast { position: fixed; bottom: calc(var(--safe-bottom) + 20px); left: 50%; transform: translateX(-50%) translateY(60px); background: #222; color: #fff; padding: 9px 18px; border-radius: 20px; font-size: 13px; opacity: 0; transition: all .3s; z-index: 200; white-space: nowrap; }
.toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }
</style>
</head>
<body>

<div class="app-shell">
  <div class="app-header">
    <div class="header-top">
      <div>
        <div class="header-title">Amsterdam</div>
        <div class="header-sub">Vincenzo &amp; Sonia · 15–17 Aprile 2026</div>
      </div>
      <button class="reset-btn" onclick="resetAll()">Reset dati</button>
    </div>
  </div>

  <div class="day-tabs">
    <button class="day-tab active" data-d="0" onclick="switchDay(0)"><span>15 Apr</span>Giorno 1</button>
    <button class="day-tab" data-d="1" onclick="switchDay(1)"><span>16 Apr</span>Giorno 2</button>
    <button class="day-tab" data-d="2" onclick="switchDay(2)"><span>17 Apr</span>Giorno 3</button>
  </div>

  <div class="progress-wrap">
    <div class="progress-info"><span id="prog-label">0 / 10 tappe visitate</span><span id="prog-pct">0%</span></div>
    <div class="progress-track"><div class="progress-fill" id="progress-fill"></div></div>
  </div>

  <div class="filter-bar">
    <button class="filter-chip" id="chip-all" onclick="setFilter('all')">Tutto</button>
    <button class="filter-chip active" id="chip-gf" onclick="setFilter('gf')">Solo GF</button>
    <button class="filter-chip" id="chip-done" onclick="setFilter('done')">Visitate</button>
  </div>

  <div class="scroll-area" id="scroll-area"></div>
</div>

<!-- MODAL -->
<div class="modal-overlay hidden" id="modal-overlay" onclick="closeModal(event)">
  <div class="modal" id="modal">
    <h2 id="modal-title">Modifica tappa</h2>
    <label>Orario</label>
    <input type="text" id="m-time" placeholder="es. 16:00">
    <label>Nome</label>
    <input type="text" id="m-name" placeholder="Nome tappa">
    <label>Note</label>
    <textarea id="m-note" placeholder="Aggiungi note..."></textarea>
    <label>Senza glutine</label>
    <select id="m-gf" style="width:100%;border:1px solid var(--border);border-radius:8px;padding:10px 12px;font-family:inherit;font-size:14px;background:var(--bg);color:var(--text);outline:none;-webkit-appearance:none;">
      <option value="">Non specificato</option>
      <option value="yes">Senza glutine ✓</option>
      <option value="no">Contiene glutine ✗</option>
    </select>
    <div class="modal-btns" id="modal-btns"></div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
const DEFAULT_DAYS = [
  {
    color:'#E8355A', title:'Centro Storico e Canali',
    mapUrl:'https://maps.app.goo.gl/1xEhEz7Psv9b28gYA',
    intro:[
      {icon:'✈',time:'07:30–08:00',desc:'Partenza da Baronissi a Napoli'},
      {icon:'✈',time:'10:25',desc:'Volo Napoli → Amsterdam'},
      {icon:'🛬',time:'13:05',desc:'Arrivo Amsterdam – taxi in hotel'},
      {icon:'🏨',time:'~14:00',desc:'Hotel ibis Styles Amsterdam Airport · Schiphol'},
    ],
    stops:[
      {time:'16:00',name:'Van Gogh Museum',note:'Visita circa 1h 30',gf:'',done:false},
      {time:'17:30',name:'Vondelpark',note:'Passeggiata breve 30 min',gf:'',done:false},
      {time:'18:15',name:'Prinsengracht',note:'Foto sui canali',gf:'',done:false},
      {time:'18:40',name:'Quartiere Jordaan',note:'Passeggiate tra canali e case tipiche',gf:'',done:false},
      {time:'19:00',name:'Van Stapele Koekmakerij',note:'Biscotto famoso – solo curiosità',gf:'no',done:false},
      {time:'19:15',name:'Fabel Friet',note:'Patatine olandesi tipiche',gf:'yes',done:false},
      {time:'19:30',name:'Dam Square',note:'Piazza principale, palazzo reale',gf:'',done:false},
      {time:'19:45',name:"Tony's Chocolonely",note:'Cioccolato – molti gusti senza glutine',gf:'yes',done:false},
      {time:'20:00',name:'Van Wonderen Stroopwafels',note:'Stroopwafel classico – contiene glutine',gf:'no',done:false},
      {time:'20:15',name:'Bloemenmarkt',note:'Passeggiata tra bancarelle di fiori',gf:'',done:false},
    ],
    gfExtras:[
      'Happy Pig Pancake Shop – pancake con opzione senza glutine',
      'Aringa olandese con cipolla – street food naturalmente GF',
      'Formaggi Gouda / Edam vicino Dam Square',
      'The Butcher – panino veloce lungo il percorso',
    ],
    pins:[
      {name:'Van Gogh Museum',addr:'Museumplein 6'},
      {name:'Vondelpark',addr:'Vondelpark, Amsterdam'},
      {name:'Prinsengracht',addr:'Prinsengracht, Jordaan'},
      {name:'Dam Square',addr:'Dam, Amsterdam'},
      {name:'Bloemenmarkt',addr:'Singel, Amsterdam'},
    ],
    notes:'',
  },
  {
    color:'#4A7C59', title:'Keukenhof + Jordaan + Crociera',
    mapUrl:'https://www.google.com/maps/dir/?api=1&origin=Keukenhof+Lisse&destination=Secret+Garden+Amsterdam&travelmode=walking&waypoints=Cafe+Winkel+43%7CJordaan+Amsterdam%7CAnne+Frank+House%7CRock+Hard+Caf%C3%A9+Amsterdam+Canal+Cruise+Boarding',
    intro:[],
    stops:[
      {time:'10:00',name:'Keukenhof Park',note:'Visita 3–3h30, uscita 13:00–13:30',gf:'',done:false},
      {time:'13:30',name:'Rientro ad Amsterdam',note:'Bus/treno, arrivo 14:15–14:45',gf:'',done:false},
      {time:'14:45',name:'Café Winkel 43',note:'Apple pie – verificare opzione GF',gf:'no',done:false},
      {time:'15:30',name:'Quartiere Jordaan',note:'Foto e negozi, circa 1h',gf:'',done:false},
      {time:'16:45',name:'Casa di Anna Frank',note:'Solo esterno – 10-15 min',gf:'',done:false},
      {time:'18:30',name:'Crociera sui Canali',note:'Pontile Rock Hard Café, 1h',gf:'',done:false},
      {time:'20:30',name:'Secret Garden',note:'Cena/cocktail, fine ~22:00',gf:'',done:false},
    ],
    gfExtras:[
      'Croque Madame – ristorante completamente gluten free',
      'Piqniq – brunch con pane senza glutine nel Jordaan',
      'Happy Pig Pancake Shop – pancake senza glutine',
    ],
    pins:[
      {name:'Keukenhof',addr:'Stationsweg 166A, Lisse'},
      {name:'Café Winkel 43',addr:'Noordermarkt 43'},
      {name:'Anne Frank House',addr:'Westermarkt 20'},
      {name:'Rock Hard Café (pontile)',addr:'Reguliersdwarsstraat'},
      {name:'Secret Garden',addr:'Amsterdam Centrum'},
    ],
    notes:'',
  },
  {
    color:'#1A3A5C', title:'Zaanse Schans + Zaandam + Noord',
    mapUrl:'https://www.google.com/maps/dir/?api=1&origin=Zaanse+Schans&destination=Pllek+Amsterdam&travelmode=walking&waypoints=Inntel+Hotels+Amsterdam+Zaandam%7CAmsterdam+Centraal+Station%7CA%27DAM+Lookout',
    intro:[],
    stops:[
      {time:'08:30',name:'Amsterdam Centraal',note:'Treno per Zaanse Schans, 17 min',gf:'',done:false},
      {time:'09:00',name:'Zaanse Schans',note:'Mulini a vento, zoccoli, villaggio ~2h30',gf:'',done:false},
      {time:'11:30',name:'Treno per Zaandam',note:'10 minuti',gf:'',done:false},
      {time:'11:45',name:'Zaandam – Inntel Hotel',note:'Architettura LEGO, foto esterne 30 min',gf:'',done:false},
      {time:'12:30',name:'Rientro ad Amsterdam',note:'Arrivo stimato 13:00',gf:'',done:false},
      {time:'13:00–17:40',name:'Tempo libero',note:"Traghetto gratuito, A'DAM Lookout, PLLEK",gf:'',done:false},
      {time:'17:40',name:'Partenza per Schiphol',note:'Treno 15 min → arrivo 18:05',gf:'',done:false},
      {time:'19:55',name:'Volo di Ritorno',note:'Check-in tranquillo, 1h50 prima',gf:'',done:false},
    ],
    gfExtras:[
      'Craft Coffee & Pastry – bakery 100% gluten free',
      'De Glutenvrije Winkel – negozio GF con stroopwafel senza glutine',
    ],
    pins:[
      {name:'Amsterdam Centraal',addr:'Stationsplein, Amsterdam'},
      {name:'Zaanse Schans',addr:'Schansend 7, Zaandam'},
      {name:'Inntel Hotel Zaandam',addr:'Provincialeweg 102, Zaandam'},
      {name:"A'DAM Lookout",addr:"Overhoeksplein 5, Amsterdam"},
      {name:'PLLEK',addr:"T.T. Neveritaweg 59, Amsterdam"},
    ],
    notes:'',
  },
];

// STATE
let data, currentDay = 0, filter = 'gf';
let editingDay = null, editingIdx = null;

function loadData() {
  const saved = localStorage.getItem('ams_v2');
  if (saved) { try { data = JSON.parse(saved); return; } catch(e){} }
  data = JSON.parse(JSON.stringify(DEFAULT_DAYS));
}
function saveData() { localStorage.setItem('ams_v2', JSON.stringify(data)); }
function resetAll() {
  if (!confirm('Resettare tutti i dati? Le modifiche andranno perse.')) return;
  localStorage.removeItem('ams_v2');
  data = JSON.parse(JSON.stringify(DEFAULT_DAYS));
  saveData(); render();
  showToast('Dati ripristinati');
}

function switchDay(d) {
  currentDay = d;
  document.querySelectorAll('.day-tab').forEach(t => {
    const active = +t.dataset.d === d;
    t.classList.toggle('active', active);
  });
  render();
}

function setFilter(f) {
  filter = f;
  ['all','gf','done'].forEach(k => {
    document.getElementById('chip-'+k).classList.toggle('active', k===f);
  });
  render();
}

function toggleDone(idx) {
  data[currentDay].stops[idx].done = !data[currentDay].stops[idx].done;
  saveData(); render();
}

function openEditStop(idx) {
  const s = idx === -1 ? {time:'',name:'',note:'',gf:'',done:false} : data[currentDay].stops[idx];
  editingDay = currentDay; editingIdx = idx;
  document.getElementById('modal-title').textContent = idx === -1 ? 'Nuova tappa' : 'Modifica tappa';
  document.getElementById('m-time').value = s.time;
  document.getElementById('m-name').value = s.name;
  document.getElementById('m-note').value = s.note;
  document.getElementById('m-gf').value = s.gf || '';
  const day = data[currentDay];
  const btns = document.getElementById('modal-btns');
  if (idx === -1) {
    btns.innerHTML = `<button class="btn-save" style="background:${day.color}" onclick="saveStop()">Aggiungi</button><button class="btn-cancel" onclick="closeModal()">Annulla</button>`;
  } else {
    btns.innerHTML = `<button class="btn-save" style="background:${day.color}" onclick="saveStop()">Salva</button><button class="btn-delete" onclick="deleteStop()">Elimina</button><button class="btn-cancel" onclick="closeModal()">Annulla</button>`;
  }
  document.getElementById('modal-overlay').classList.remove('hidden');
  setTimeout(() => document.getElementById('m-name').focus(), 100);
}

function saveStop() {
  const t = document.getElementById('m-time').value.trim();
  const n = document.getElementById('m-name').value.trim();
  if (!n) { showToast('Inserisci un nome'); return; }
  const stop = { time:t, name:n, note:document.getElementById('m-note').value.trim(), gf:document.getElementById('m-gf').value, done: editingIdx === -1 ? false : data[editingDay].stops[editingIdx].done };
  if (editingIdx === -1) { data[editingDay].stops.push(stop); }
  else { data[editingDay].stops[editingIdx] = stop; }
  saveData(); closeModal(); render();
  showToast(editingIdx === -1 ? 'Tappa aggiunta!' : 'Modifiche salvate');
}

function deleteStop() {
  if (!confirm('Eliminare questa tappa?')) return;
  data[editingDay].stops.splice(editingIdx, 1);
  saveData(); closeModal(); render();
  showToast('Tappa eliminata');
}

function closeModal(e) {
  if (e && e.target !== document.getElementById('modal-overlay')) return;
  document.getElementById('modal-overlay').classList.add('hidden');
}

function saveNotes(val) {
  data[currentDay].notes = val;
  saveData();
}

function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg; t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2000);
}

function render() {
  const day = data[currentDay];
  const color = day.color;

  // progress
  const total = day.stops.length;
  const done = day.stops.filter(s => s.done).length;
  const pct = total ? Math.round(done/total*100) : 0;
  document.getElementById('prog-label').textContent = `${done} / ${total} tappe visitate`;
  document.getElementById('prog-pct').textContent = pct + '%';
  document.getElementById('progress-fill').style.width = pct + '%';

  // filter stops
  let stops = day.stops.map((s,i) => ({...s, idx:i}));
  if (filter === 'gf') stops = stops.filter(s => s.gf !== '');
  if (filter === 'done') stops = stops.filter(s => s.done);

  let h = '';

  // intro
  if (day.intro.length) {
    h += '<div class="intro-box">';
    day.intro.forEach(r => {
      h += `<div class="intro-row"><span class="intro-icon">${r.icon}</span><span class="intro-time">${r.time}</span><span class="intro-desc">${r.desc}</span></div>`;
    });
    h += '</div>';
  }

  // stops label
  const lbl = filter==='gf' ? 'Tappe con info glutine' : filter==='done' ? 'Tappe visitate' : 'Itinerario';
  h += `<div class="section-lbl">${lbl}</div>`;

  // add button
  h += `<button class="add-stop-btn" onclick="openEditStop(-1)">+ Aggiungi tappa</button>`;

  // stops
  stops.forEach(s => {
    const gfHtml = s.gf === 'yes' ? '<span class="gf-badge gf-yes">Senza glutine ✓</span>' : s.gf === 'no' ? '<span class="gf-badge gf-no">Contiene glutine ✗</span>' : '';
    h += `<div class="stop-card${s.done?' done':''}">
      <div class="stop-top">
        <div class="stop-check${s.done?' checked':''}" style="${s.done?`background:${color};border-color:${color}`:''}" onclick="toggleDone(${s.idx})"></div>
        <div class="stop-body">
          <span class="stop-time-badge" style="background:${color}">${s.time}</span>
          <div class="stop-name">${s.name}</div>
          <div class="stop-note">${s.note}</div>
          ${gfHtml}
        </div>
      </div>
      <div class="stop-actions">
        <button class="stop-btn" onclick="openEditStop(${s.idx})">Modifica</button>
      </div>
    </div>`;
  });

  if (stops.length === 0) {
    h += '<div style="text-align:center;padding:24px 0;color:var(--muted);font-size:13px;">Nessuna tappa da mostrare</div>';
  }

  // GF extras
  if (day.gfExtras.length) {
    h += '<div class="gf-box"><div class="gf-box-title">🌾 Opzioni senza glutine nelle vicinanze</div>';
    day.gfExtras.forEach(e => { h += `<div class="gf-item"><div class="gf-dot"></div><span>${e}</span></div>`; });
    h += '</div>';
  }

  // Notes
  h += `<div class="section-lbl" style="margin-top:16px">Note del giorno</div>
  <div class="notes-box">
    <textarea class="notes-textarea" placeholder="Scrivi qui le tue note per oggi..." onchange="saveNotes(this.value)" oninput="saveNotes(this.value)">${day.notes||''}</textarea>
  </div>`;

  // Map
  h += `<div class="map-box">
    <div class="map-head"><span>Tappe principali</span><a class="map-link" href="${day.mapUrl}">Apri mappa</a></div>`;
  day.pins.forEach((p,i) => {
    h += `<div class="map-pin"><div class="pin-num" style="background:${color}">${i+1}</div><div><div class="pin-name">${p.name}</div><div class="pin-addr">${p.addr}</div></div></div>`;
  });
  h += '</div>';

  document.getElementById('scroll-area').innerHTML = h;
}

loadData();
setFilter('gf');
</script>
</body>
</html>
